name: Apply HR RTBuddy-only stop experiment

on:
  push:
    branches:
      - agent/hr-rtbuddy-only-stop

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out experiment branch
        uses: actions/checkout@v4
        with:
          ref: agent/hr-rtbuddy-only-stop
          fetch-depth: 0

      - name: Remove AACP HR stop command
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/src/main/java/me/kavishdevar/librepods/bluetooth/AACPManager.kt")
          text = path.read_text()
          old = """    fun forceStopHeartRateStreaming(): Boolean {
              val stopOk = sendStopHeartRate()
              val controlOk = sendHeartRateMonitorEnabled(false)
              heartRateStreamingRequested = false
              return stopOk && controlOk
          }
          """
          new = """    fun forceStopHeartRateStreaming(): Boolean {
              val stopOk = sendStopHeartRate()
              heartRateStreamingRequested = false
              return stopOk
          }
          """
          if old not in text:
              raise SystemExit("Expected forceStopHeartRateStreaming block was not found")
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/agent-hr-rtbuddy-only-stop.yml

      - name: Commit experiment
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/me/kavishdevar/librepods/bluetooth/AACPManager.kt .github/workflows/agent-hr-rtbuddy-only-stop.yml
          git commit -m "Use RTBuddy-only heart-rate stop"
          git push origin HEAD:agent/hr-rtbuddy-only-stop
