name: Apply HR RTBuddy-only stop experiment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - agent/hr-rtbuddy-only-stop

permissions:
  contents: write
  pull-requests: read

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/hr-stop-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Check out experiment branch
        uses: actions/checkout@v4
        with:
          ref: agent/hr-rtbuddy-only-stop
          fetch-depth: 0

      - name: Remove AACP HR stop command
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/src/main/java/me/kavishdevar/librepods/bluetooth/AACPManager.kt")
          text = path.read_text()
          control_line = "        val controlOk = sendHeartRateMonitorEnabled(false)\n"
          return_line = "        return stopOk && controlOk"
          if text.count(control_line) != 1:
              raise SystemExit(f"Expected one AACP HR stop line, found {text.count(control_line)}")
          if text.count(return_line) != 1:
              raise SystemExit(f"Expected one combined stop result line, found {text.count(return_line)}")
          text = text.replace(control_line, "", 1)
          text = text.replace(return_line, "        return stopOk", 1)
          path.write_text(text)
          PY
          rm .github/workflows/agent-hr-rtbuddy-only-stop.yml

      - name: Commit experiment
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/me/kavishdevar/librepods/bluetooth/AACPManager.kt .github/workflows/agent-hr-rtbuddy-only-stop.yml
          git commit -m "Use RTBuddy-only heart-rate stop"
          git push origin HEAD:agent/hr-rtbuddy-only-stop
